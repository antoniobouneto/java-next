version: '3.9'

services:
  backend:
    build:
      context: ./demo
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080/api/pdf/convert
    depends_on: 
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
